services:
  # ── Telegram Bot (background worker) ──────────────────────────────────────
  - type: worker
    name: homework-bot
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python bot.py
    plan: starter          # $7/month, не засыпает, нужен для бота
    envVars:
      - key: BOT_TOKEN
        sync: false        # задать вручную в Render Dashboard
      - key: MISTRAL_API_KEY
        sync: false
      - key: ADMIN_USER_ID
        sync: false
      - key: CALENDAR_ID
        value: primary
      - key: TIMEZONE
        value: Europe/Moscow
      - key: WEB_APP_URL
        sync: false        # задать после деплоя webapp
      - key: WEBAPP_CHAT_ID
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: GOOGLE_TOKEN_JSON
        sync: false
    disk:
      name: bot-data
      mountPath: /data     # config.py автоматически найдёт /data
      sizeGB: 1            # $0.25/month

  # ── Next.js WebApp ─────────────────────────────────────────────────────────
  - type: web
    name: homework-webapp
    runtime: node
    rootDir: webapp
    buildCommand: npm install && npm run build
    startCommand: npm run start
    plan: free             # бесплатный, но засыпает через 15 мин без запросов
    envVars:
      - key: NEXT_PUBLIC_API_URL
        sync: false        # оставить пустым для mock-режима, или URL бэкенда
